# PostgreSQL. Supported versions 9.3 and up.
#
# Environment variables used here:
# - DB_HOST
# - DB_PORT
# - DB_USER
# - DB_PASSWORD
# - DB_NAME
# - TEST_DB_NAME
# - DATABASE_URL
#
default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  username: <%= ENV.fetch("DB_USER", "bene") %>
  password: <%= ENV["DB_PASSWORD"] %>
  host: <%= ENV["DB_HOST"] %>
  port: <%= ENV["DB_PORT"] %>

development:
  primary:
    <<: *default
    database: <%= ENV.fetch("DB_NAME", "comuh_development") %>
  cable:
    <<: *default
    database: <%= ENV.fetch("CABLE_DB_NAME", "comuh_cable_development") %>
    migrations_paths: db/cable_migrate

# Warning: The database defined as "test" will be erased and
# re-generated from your development database when you run "rake".
# Do not set this db to the same as development or production.
test:
  primary:
    <<: *default
    database: <%= ENV.fetch("TEST_DB_NAME", "comuh_test") %>
  cable:
    <<: *default
    database: <%= ENV.fetch("TEST_CABLE_DB_NAME", "comuh_cable_test") %>
    migrations_paths: db/cable_migrate

production:
  primary:
    <<: *default
    url: <%= ENV["DATABASE_URL"] %>
  cable:
    <<: *default
    url: <%= ENV["CABLE_DATABASE_URL"] || ENV["DATABASE_URL"] %>
    migrations_paths: db/cable_migrate
