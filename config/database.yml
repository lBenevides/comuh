# PostgreSQL. Supported versions 9.3 and up.
#
# Environment variables used here:
# - DB_HOST
# - DB_PORT
# - DB_USER
# - DB_PASSWORD
# - DB_NAME
# - TEST_DB_NAME
# - DATABASE_URL
#
default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  username: <%= ENV.fetch("DB_USER", "bene") %>
  password: <%= ENV["DB_PASSWORD"] %>
  host: <%= ENV["DB_HOST"] %>
  port: <%= ENV["DB_PORT"] %>

development:
  <<: *default
  database: <%= ENV.fetch("DB_NAME", "comuh_development") %>

# Warning: The database defined as "test" will be erased and
# re-generated from your development database when you run "rake".
# Do not set this db to the same as development or production.
test:
  <<: *default
  database: <%= ENV.fetch("TEST_DB_NAME", "comuh_test") %>

production:
  primary: &primary_production
    <<: *default
    url: <%= ENV["DATABASE_URL"] %>
  cache:
    <<: *primary_production
    database: comuh_production_cache
    migrations_paths: db/cache_migrate
  queue:
    <<: *primary_production
    database: comuh_production_queue
    migrations_paths: db/queue_migrate
  cable:
    <<: *primary_production
    database: comuh_production_cable
    migrations_paths: db/cable_migrate
